<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odeme Basarisiz</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #fff1f2, #ffe4e6);
        color: #1f2937;
      }

      .failure-card {
        width: 100%;
        max-width: 480px;
        padding: 40px 32px;
        border-radius: 20px;
        background-color: #ffffff;
        box-shadow: 0 20px 45px rgba(16, 24, 40, 0.12);
        text-align: center;
      }

      .failure-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 20px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #dc2626;
        color: #ffffff;
        font-size: 36px;
        font-weight: bold;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 30px;
      }

      p {
        margin: 0 0 24px;
        line-height: 1.6;
        color: #4b5563;
      }

      .retry-link {
        display: inline-block;
        padding: 12px 24px;
        border-radius: 10px;
        text-decoration: none;
        background-color: #dc2626;
        color: #ffffff;
        font-weight: 600;
      }

      .retry-link:hover {
        background-color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main class="failure-card">
      <div class="failure-icon">!</div>
      <h1>Odeme Basarisiz</h1>
      <p>
        Odeme islemi tamamlanamadi. Lutfen kart bilgilerinizi kontrol ederek
        tekrar deneyin.
      </p>
      <a class="retry-link" href="/">Tekrar Dene</a>
    </main>
  </body>
</html>
