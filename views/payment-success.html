<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odeme Basarili</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ecfdf3, #d1fae5);
        color: #1f2937;
      }

      .success-card {
        width: 100%;
        max-width: 480px;
        padding: 40px 32px;
        border-radius: 20px;
        background-color: #ffffff;
        box-shadow: 0 20px 45px rgba(16, 24, 40, 0.12);
        text-align: center;
      }

      .success-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 20px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #16a34a;
        color: #ffffff;
        font-size: 36px;
        font-weight: bold;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 30px;
      }

      p {
        margin: 0 0 24px;
        line-height: 1.6;
        color: #4b5563;
      }

      .home-link {
        display: inline-block;
        padding: 12px 24px;
        border-radius: 10px;
        text-decoration: none;
        background-color: #16a34a;
        color: #ffffff;
        font-weight: 600;
      }

      .home-link:hover {
        background-color: #15803d;
      }
    </style>
  </head>
  <body>
    <main class="success-card">
      <div class="success-icon">✓</div>
      <h1>Odeme Basarili</h1>
      <p>
        Odemeniz basariyla tamamlandi. Siparisiniz alinmistir ve en kisa surede
        isleme alinacaktir.
      </p>
      <a class="home-link" href="/">Ana Sayfaya Don</a>
    </main>
  </body>
</html>
